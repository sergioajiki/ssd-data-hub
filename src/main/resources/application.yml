server:
  port: 8085

spring:
  application:
    name: ssd-data-hub

  datasource:
    url: jdbc:h2:file:./data/datahub;AUTO_SERVER=TRUE
    driver-class-name: org.h2.Driver
    username: sa
    password: ''

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
